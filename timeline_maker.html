<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间线对比图生成器</title>
<!-- jsPDF for PDF export -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

.app-header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: white; padding: 18px 30px; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.app-header h1 { font-size: 22px; font-weight: 700; }
.app-header p { font-size: 13px; opacity: 0.7; margin-top: 3px; }

.main-content {
  display: flex; gap: 16px; padding: 16px;
  max-width: 1500px; margin: 0 auto; align-items: flex-start;
}
.left-panel { width: 268px; flex-shrink: 0; }
.right-panel { flex: 1; min-width: 0; }

.card {
  background: white; border-radius: 10px; padding: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08); margin-bottom: 12px;
}
.card h3 {
  font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 14px; padding-bottom: 8px;
  border-bottom: 1px solid #f0f2f5;
}

.form-row { display: flex; gap: 8px; margin-bottom: 10px; }
.form-group { flex: 1; }
label { display: block; font-size: 11px; color: #999; margin-bottom: 3px; font-weight: 500; }

input[type="number"], input[type="text"], textarea, select {
  width: 100%; padding: 6px 9px; border: 1px solid #e8e8e8; border-radius: 6px;
  font-size: 13px; color: #333; background: #fafafa;
  transition: border-color 0.15s, background 0.15s;
}
input:focus, textarea:focus, select:focus {
  outline: none; border-color: #0f3460; background: white;
}
input[type="color"] {
  width: 100%; height: 32px; padding: 2px 3px;
  border: 1px solid #e8e8e8; border-radius: 6px; cursor: pointer; background: white;
}
.checkbox-row {
  display: flex; align-items: center; gap: 7px; margin-bottom: 10px;
}
.checkbox-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: #0f3460; }
.checkbox-row label { margin: 0; font-size: 12px; color: #555; cursor: pointer; font-weight: 400; }

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px; padding: 9px 16px; border: none; border-radius: 7px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.18s; white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, #1a1a2e, #0f3460);
  color: white; width: 100%; padding: 11px; font-size: 14px;
}
.btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(15,52,96,0.4); }
.btn-sm { background: #f0f2f5; color: #555; padding: 6px 12px; font-size: 12px; }
.btn-sm:hover { background: #e4e8ed; }

/* Export button row */
.export-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 7px; margin-top: 9px;
}
.export-row .btn { padding: 9px 0; font-size: 12.5px; }
.btn-png { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
.btn-png:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(39,174,96,0.4); }
.btn-svg { background: linear-gradient(135deg, #7c3aed, #8b5cf6); color: white; }
.btn-svg:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(124,58,237,0.4); }
.btn-pdf { background: linear-gradient(135deg, #c0392b, #e74c3c); color: white; }
.btn-pdf:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 3px 10px rgba(192,57,43,0.4); }

/* Format tips */
.format-tips {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 6px; margin-top: 7px;
}
.fmt-tip {
  background: #f8f9fa; border-radius: 6px; padding: 7px 8px;
  font-size: 10px; color: #888; line-height: 1.5; text-align: center;
}
.fmt-tip strong { display: block; font-size: 11px; margin-bottom: 2px; }
.fmt-tip.png strong { color: #27ae60; }
.fmt-tip.svg strong { color: #7c3aed; }
.fmt-tip.pdf strong { color: #c0392b; }

/* Tabs */
.tab-bar { display: flex; gap: 4px; margin-bottom: 14px; }
.tab {
  padding: 7px 16px; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 600; color: #888;
  background: #f0f2f5; border: none; transition: all 0.15s;
}
.tab.active { background: #0f3460; color: white; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Edit grid */
.grid-wrapper { overflow-x: auto; padding-bottom: 4px; }
.grid-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
.row-label-wrap {
  width: 86px; flex-shrink: 0; display: flex; align-items: center;
}
.row-label-wrap input {
  width: 100%; font-size: 12px !important; font-weight: 600 !important; text-align: left;
}

/* Cell */
.cell {
  flex: 0 0 auto; width: 108px;
  background: #f8f9fa; border: 1.5px dashed #ccc; border-radius: 7px;
  cursor: pointer; position: relative; transition: all 0.15s;
}
.cell:hover { border-color: #0f3460; background: #f0f4fb; }
.cell.has-image { border-style: solid; border-color: #0f3460; background: white; }
.cell.drag-over { border-color: #27ae60; background: #f0faf4; }
.cell-img-wrap {
  width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
  overflow: hidden; border-radius: 6px; position: relative; background: #eee;
}
.cell-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cell-placeholder {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 100%; height: 100%; color: #bbb; font-size: 10px; gap: 4px; user-select: none;
}
.cell-placeholder svg { width: 20px; height: 20px; }
.cell-remove {
  position: absolute; top: 3px; right: 3px;
  background: rgba(220,50,50,0.85); color: white; border: none;
  border-radius: 50%; width: 17px; height: 17px; font-size: 9px;
  cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 5;
}
.cell.has-image .cell-remove { display: flex; }
.cell-remove:hover { background: rgba(200,30,30,1); }

/* Preview */
.preview-area {
  background: #e8eaed; border-radius: 8px; padding: 20px;
  text-align: center; min-height: 300px;
  display: flex; align-items: center; justify-content: center; overflow: auto;
}
.preview-area canvas { max-width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.18); border-radius: 2px; }
.preview-placeholder { color: #bbb; font-size: 14px; }

.batch-hint {
  background: #f0f4fb; border: 1px dashed #0f3460; border-radius: 8px;
  padding: 9px 12px; margin-bottom: 10px; display: flex; align-items: center;
  gap: 10px; font-size: 12px; color: #0f3460;
}
.status-bar { font-size: 11px; color: #aaa; margin-top: 8px; text-align: center; }
.hidden { display: none !important; }
</style>
</head>
<body>

<div class="app-header">
  <h1>时间线对比图生成器</h1>
  <p>支持导出 PNG · SVG（矢量）· PDF（LaTeX 直接引用）</p>
</div>

<div class="main-content">

  <!-- ═══ Left Panel ══════════════════════════════════════════════════════════ -->
  <div class="left-panel">

    <div class="card">
      <h3>网格配置</h3>
      <div class="form-row">
        <div class="form-group"><label>行数（方法数）</label><input type="number" id="numRows" value="3" min="1" max="10"></div>
        <div class="form-group"><label>列数（时间帧）</label><input type="number" id="numCols" value="7" min="1" max="16"></div>
      </div>
      <button class="btn btn-sm" style="width:100%" onclick="applyGrid()">应用网格</button>
    </div>

    <div class="card">
      <h3>Timeline 设置</h3>
      <div class="checkbox-row">
        <input type="checkbox" id="showTimeline" checked>
        <label for="showTimeline">显示时间线箭头</label>
      </div>
      <div class="form-group" style="margin-bottom:10px">
        <label>Timeline 文字</label>
        <input type="text" id="timelineText" value="Timeline">
      </div>
      <div class="form-row">
        <div class="form-group"><label>区域高度</label><input type="number" id="tlHeight" value="30" min="20" max="80"></div>
        <div class="form-group"><label>箭头粗细</label><input type="number" id="arrowThick" value="2.5" min="1" max="8" step="0.5"></div>
      </div>
    </div>

    <div class="card">
      <h3>图像与布局</h3>
      <div class="form-row">
        <div class="form-group"><label>图片宽度 (px)</label><input type="number" id="imgW" value="200" min="40" max="600"></div>
        <div class="form-group"><label>图片高度 (px)</label><input type="number" id="imgH" value="200" min="40" max="600"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>图片间距</label><input type="number" id="cellGap" value="4" min="0" max="60"></div>
        <div class="form-group"><label>外边距</label><input type="number" id="outerPad" value="8" min="0" max="80"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>行标签宽度</label><input type="number" id="rowLblW" value="90" min="40" max="160"></div>
        <div class="form-group"><label>行间距</label><input type="number" id="rowGap" value="6" min="0" max="60"></div>
      </div>
    </div>

    <div class="card">
      <h3>文字样式</h3>
      <div class="form-row">
        <div class="form-group"><label>背景色</label><input type="color" id="bgColor" value="#ffffff"></div>
        <div class="form-group"><label>文字颜色</label><input type="color" id="fontColor" value="#111111"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>行标签字号</label><input type="number" id="labelFontSz" value="17" min="6" max="40"></div>
        <div class="form-group"><label>Timeline 字号</label><input type="number" id="tlFontSz" value="17" min="6" max="40"></div>
      </div>
      <div class="form-group" style="margin-bottom:10px">
        <label>字体</label>
        <select id="fontFamily">
          <option value="Arial, sans-serif">Arial</option>
          <option value="Times New Roman, serif" selected>Times New Roman</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Helvetica Neue', sans-serif">Helvetica Neue</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>PNG/PDF 输出倍率（SVG 与倍率无关）</label>
        <select id="outScale">
          <option value="1">1× — 低分辨率</option>
          <option value="2" selected>2× — 推荐</option>
          <option value="3">3× — 高分辨率 (~300 DPI)</option>
        </select>
      </div>
    </div>

    <!-- Generate + Export -->
    <button class="btn btn-primary" onclick="generateFigure()">✦ 生成对比图</button>

    <div class="export-row hidden" id="exportRow">
      <button class="btn btn-png" onclick="doExport('png')">⬇ PNG</button>
      <button class="btn btn-svg" onclick="doExport('svg')">⬇ SVG</button>
      <button class="btn btn-pdf" onclick="doExport('pdf')">⬇ PDF</button>
    </div>

    <div class="format-tips hidden" id="formatTips">
      <div class="fmt-tip png"><strong>PNG</strong>演示 / 网页</div>
      <div class="fmt-tip svg"><strong>SVG</strong>矢量，可用 Inkscape 编辑</div>
      <div class="fmt-tip pdf"><strong>PDF</strong>LaTeX \includegraphics</div>
    </div>

    <p class="status-bar" id="statusBar"></p>
  </div>

  <!-- ═══ Right Panel ═════════════════════════════════════════════════════════ -->
  <div class="right-panel">
    <div class="card">
      <div class="tab-bar">
        <button class="tab active" id="tab-edit-btn" onclick="switchTab('edit')">编辑网格</button>
        <button class="tab" id="tab-preview-btn" onclick="switchTab('preview')">预览</button>
      </div>

      <!-- Edit Tab -->
      <div class="tab-content active" id="tab-edit">
        <div class="batch-hint">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>点击格子上传 · 拖拽图片到格子 · 行标签可直接编辑</span>
          <button class="btn btn-sm" style="margin-left:auto;flex-shrink:0" onclick="batchUpload()">批量导入</button>
        </div>
        <div class="grid-wrapper">
          <div id="tlPreviewBar" style="display:flex;align-items:center;gap:8px;padding:8px 12px 8px 8px;margin-bottom:8px;background:#fafafa;border-radius:6px;border:1px solid #eee;">
            <span style="font-size:13px;font-weight:700;white-space:nowrap" id="tlPreviewText">Timeline</span>
            <div style="flex:1;height:2px;background:#222;position:relative;margin-left:6px;">
              <div style="position:absolute;right:-1px;top:50%;transform:translateY(-50%);border-left:8px solid #222;border-top:5px solid transparent;border-bottom:5px solid transparent;"></div>
            </div>
          </div>
          <div id="gridBody"></div>
        </div>
      </div>

      <!-- Preview Tab -->
      <div class="tab-content" id="tab-preview">
        <div class="preview-area" id="previewArea">
          <p class="preview-placeholder">请先点击左侧「生成对比图」按钮</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let R = 3, C = 7;
let cells   = [];
let rowLbls = [];
let cachedCanvas = null;  // for PNG / PDF
let cachedSVG    = null;  // for SVG

initGrid(R, C);

document.getElementById('timelineText').addEventListener('input', e => {
  document.getElementById('tlPreviewText').textContent = e.target.value || 'Timeline';
});
document.getElementById('showTimeline').addEventListener('change', e => {
  document.getElementById('tlPreviewBar').style.display = e.target.checked ? 'flex' : 'none';
});

// ─── Grid ─────────────────────────────────────────────────────────────────────
function initGrid(rows, cols) {
  const oc = cells, ol = rowLbls;
  R = rows; C = cols;
  cells   = Array.from({length: R}, (_, r) =>
    Array.from({length: C}, (_, c) => (oc[r] && oc[r][c]) ? oc[r][c] : {imgEl: null, dataUrl: ''})
  );
  rowLbls = Array.from({length: R}, (_, r) => ol[r] ?? `(${String.fromCharCode(97+r)}) Method ${r+1}`);
  renderGrid();
}

function applyGrid() {
  initGrid(
    Math.max(1, Math.min(10, +document.getElementById('numRows').value || 3)),
    Math.max(1, Math.min(16, +document.getElementById('numCols').value || 7))
  );
}

function renderGrid() {
  const body = document.getElementById('gridBody');
  body.innerHTML = '';
  for (let r = 0; r < R; r++) {
    const row = document.createElement('div');
    row.className = 'grid-row';
    const lw = document.createElement('div');
    lw.className = 'row-label-wrap';
    const li = document.createElement('input');
    li.type = 'text'; li.value = rowLbls[r];
    li.placeholder = `(${String.fromCharCode(97+r)}) 方法名`;
    li.dataset.r = r;
    li.addEventListener('input', e => { rowLbls[+e.target.dataset.r] = e.target.value; });
    lw.appendChild(li); row.appendChild(lw);
    for (let c = 0; c < C; c++) row.appendChild(buildCell(r, c));
    body.appendChild(row);
  }
}

function buildCell(r, c) {
  const data = cells[r][c];
  const cell = document.createElement('div');
  cell.className = 'cell' + (data.imgEl ? ' has-image' : '');

  const wrap = document.createElement('div');
  wrap.className = 'cell-img-wrap';
  if (data.imgEl) {
    const img = document.createElement('img');
    img.src = data.dataUrl;
    wrap.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'cell-placeholder';
    ph.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 17l5-5 4 4 3-3 6 6"/>
      <circle cx="8" cy="9" r="1.5"/></svg><span>上传</span>`;
    wrap.appendChild(ph);
  }
  const rm = document.createElement('button');
  rm.className = 'cell-remove'; rm.textContent = '✕';
  rm.addEventListener('click', e => {
    e.stopPropagation();
    cells[r][c] = {imgEl: null, dataUrl: ''};
    renderGrid();
  });
  wrap.appendChild(rm);
  wrap.addEventListener('click', () => pickImage(r, c));
  cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drag-over'); });
  cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
  cell.addEventListener('drop', e => {
    e.preventDefault(); cell.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) loadFile(f, r, c);
  });
  cell.appendChild(wrap);
  return cell;
}

// ─── Image loading ────────────────────────────────────────────────────────────
function pickImage(r, c) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = e => { const f = e.target.files[0]; if (f) loadFile(f, r, c); };
  inp.click();
}
function loadFile(file, r, c) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => { cells[r][c] = {imgEl: img, dataUrl: ev.target.result}; renderGrid(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}
function batchUpload() {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
  inp.onchange = e => {
    let idx = 0;
    const files = Array.from(e.target.files);
    for (let r = 0; r < R && idx < files.length; r++)
      for (let c = 0; c < C && idx < files.length; c++)
        loadFile(files[idx++], r, c);
  };
  inp.click();
}

// ─── Layout computation (shared by canvas + SVG) ──────────────────────────────
function computeLayout() {
  const imgW      = +document.getElementById('imgW').value       || 200;
  const imgH      = +document.getElementById('imgH').value       || 200;
  const cellGap   = +document.getElementById('cellGap').value    || 10;
  const outerPad  = +document.getElementById('outerPad').value   || 20;
  const rowLblW   = +document.getElementById('rowLblW').value    || 90;
  const rowGap    = +document.getElementById('rowGap').value     || 14;
  const tlHeight  = +document.getElementById('tlHeight').value   || 40;
  const arrowThk  = +document.getElementById('arrowThick').value || 2.5;
  const labelFSz  = +document.getElementById('labelFontSz').value|| 17;
  const tlFSz     = +document.getElementById('tlFontSz').value   || 17;
  const scale     = +document.getElementById('outScale').value   || 2;
  const bgColor   = document.getElementById('bgColor').value;
  const fontColor = document.getElementById('fontColor').value;
  const fontFam   = document.getElementById('fontFamily').value;
  const showTL    = document.getElementById('showTimeline').checked;
  const tlText    = document.getElementById('timelineText').value || 'Timeline';

  const imagesAreaW  = (imgW + cellGap) * C - cellGap;
  const tlAreaH      = showTL ? tlHeight : 0;
  const rowH         = imgH;
  const totalRowsH   = rowH * R + rowGap * (R - 1);
  const imagesStartX = outerPad + rowLblW + cellGap;
  const canW         = outerPad + rowLblW + cellGap + imagesAreaW + outerPad;
  const canH         = outerPad + tlAreaH + totalRowsH + outerPad;

  // Measure Timeline text width (used in both canvas & SVG)
  const tmpCtx = document.createElement('canvas').getContext('2d');
  tmpCtx.font = `bold ${tlFSz}px ${fontFam}`;
  const tlTextW = showTL ? tmpCtx.measureText(tlText).width : 0;

  return {
    imgW, imgH, cellGap, outerPad, rowLblW, rowGap,
    tlHeight, arrowThk, labelFSz, tlFSz, scale,
    bgColor, fontColor, fontFam, showTL, tlText, tlTextW,
    imagesAreaW, tlAreaH, rowH, totalRowsH, imagesStartX, canW, canH
  };
}

// ─── Render to Canvas ─────────────────────────────────────────────────────────
function renderToCanvas(L) {
  const canvas = document.createElement('canvas');
  canvas.width  = Math.round(L.canW * L.scale);
  canvas.height = Math.round(L.canH * L.scale);
  const ctx = canvas.getContext('2d');
  ctx.scale(L.scale, L.scale);

  ctx.fillStyle = L.bgColor;
  ctx.fillRect(0, 0, L.canW, L.canH);

  if (L.showTL) {
    const tlY = L.outerPad + L.tlHeight / 2;
    ctx.fillStyle = L.fontColor;
    ctx.font = `bold ${L.tlFSz}px ${L.fontFam}`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(L.tlText, L.imagesStartX, tlY);

    const lineStartX = L.imagesStartX + L.tlTextW + 12;
    const lineEndX   = L.imagesStartX + L.imagesAreaW;
    const ah = 10;

    ctx.strokeStyle = L.fontColor; ctx.lineWidth = L.arrowThk; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(lineStartX, tlY); ctx.lineTo(lineEndX - ah, tlY); ctx.stroke();

    ctx.fillStyle = L.fontColor;
    ctx.beginPath();
    ctx.moveTo(lineEndX, tlY);
    ctx.lineTo(lineEndX - ah, tlY - ah * 0.55);
    ctx.lineTo(lineEndX - ah, tlY + ah * 0.55);
    ctx.closePath(); ctx.fill();
  }

  for (let r = 0; r < R; r++) {
    const rowTop = L.outerPad + L.tlAreaH + r * (L.rowH + L.rowGap);
    ctx.fillStyle = L.fontColor;
    ctx.font = `italic bold ${L.labelFSz}px ${L.fontFam}`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(rowLbls[r] || '', L.outerPad, rowTop + L.rowH / 2, L.rowLblW);

    for (let c = 0; c < C; c++) {
      const imgX = L.imagesStartX + c * (L.imgW + L.cellGap);
      const data  = cells[r][c];
      if (data.imgEl) {
        ctx.drawImage(data.imgEl, imgX, rowTop, L.imgW, L.imgH);
      } else {
        ctx.fillStyle = '#e4e4e4';
        ctx.fillRect(imgX, rowTop, L.imgW, L.imgH);
        ctx.fillStyle = '#bbb';
        ctx.font = `${Math.round(L.labelFSz * 0.75)}px ${L.fontFam}`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('(空)', imgX + L.imgW / 2, rowTop + L.rowH / 2);
      }
    }
  }
  return canvas;
}

// ─── Build SVG (true vector, images embedded as base64) ───────────────────────
function buildSVG(L) {
  const p = []; // parts
  const ea = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  const et = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  p.push(`<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"`
       + ` width="${L.canW}" height="${L.canH}" viewBox="0 0 ${L.canW} ${L.canH}">`);
  p.push(`  <rect width="${L.canW}" height="${L.canH}" fill="${ea(L.bgColor)}"/>`);

  if (L.showTL) {
    const tlY = L.outerPad + L.tlHeight / 2;
    p.push(`  <text x="${L.imagesStartX}" y="${tlY}"`
         + ` dominant-baseline="middle" text-anchor="start"`
         + ` font-family="${ea(L.fontFam)}" font-size="${L.tlFSz}" font-weight="bold" fill="${ea(L.fontColor)}">`
         + `${et(L.tlText)}</text>`);

    const lineStartX = L.imagesStartX + L.tlTextW + 12;
    const lineEndX   = L.imagesStartX + L.imagesAreaW;
    const ah = 10;
    p.push(`  <line x1="${lineStartX}" y1="${tlY}" x2="${lineEndX - ah}" y2="${tlY}"`
         + ` stroke="${ea(L.fontColor)}" stroke-width="${L.arrowThk}" stroke-linecap="round"/>`);
    p.push(`  <polygon points="${lineEndX},${tlY} ${lineEndX-ah},${tlY - ah*0.55} ${lineEndX-ah},${tlY + ah*0.55}"`
         + ` fill="${ea(L.fontColor)}"/>`);
  }

  for (let r = 0; r < R; r++) {
    const rowTop  = L.outerPad + L.tlAreaH + r * (L.rowH + L.rowGap);
    const labelY  = rowTop + L.rowH / 2;
    p.push(`  <text x="${L.outerPad}" y="${labelY}"`
         + ` dominant-baseline="middle" text-anchor="start"`
         + ` font-family="${ea(L.fontFam)}" font-size="${L.labelFSz}"`
         + ` font-weight="bold" font-style="italic" fill="${ea(L.fontColor)}">`
         + `${et(rowLbls[r] || '')}</text>`);

    for (let c = 0; c < C; c++) {
      const imgX = L.imagesStartX + c * (L.imgW + L.cellGap);
      const data  = cells[r][c];
      if (data.dataUrl) {
        // Embed image as base64 – both href (modern) and xlink:href (compatibility)
        p.push(`  <image x="${imgX}" y="${rowTop}" width="${L.imgW}" height="${L.imgH}"`
             + ` href="${data.dataUrl}" xlink:href="${data.dataUrl}"`
             + ` preserveAspectRatio="xMidYMid slice"/>`);
      } else {
        p.push(`  <rect x="${imgX}" y="${rowTop}" width="${L.imgW}" height="${L.imgH}" fill="#e4e4e4"/>`);
        p.push(`  <text x="${imgX + L.imgW/2}" y="${rowTop + L.rowH/2}"`
             + ` dominant-baseline="middle" text-anchor="middle"`
             + ` font-family="${ea(L.fontFam)}" font-size="${Math.round(L.labelFSz*0.75)}" fill="#bbbbbb">(空)</text>`);
      }
    }
  }

  p.push('</svg>');
  return p.join('\n');
}

// ─── Main: generate + preview ─────────────────────────────────────────────────
function generateFigure() {
  const L = computeLayout();
  cachedCanvas = renderToCanvas(L);
  cachedSVG    = buildSVG(L);

  // Preview (show canvas)
  const area = document.getElementById('previewArea');
  area.innerHTML = '';
  const prev = cachedCanvas.cloneNode();
  prev.getContext('2d').drawImage(cachedCanvas, 0, 0);
  prev.style.maxWidth = '100%';
  prev.style.boxShadow = '0 4px 24px rgba(0,0,0,0.18)';
  area.appendChild(prev);

  document.getElementById('exportRow').classList.remove('hidden');
  document.getElementById('formatTips').classList.remove('hidden');
  document.getElementById('statusBar').textContent =
    `逻辑尺寸 ${L.canW}×${L.canH} px｜输出 ${cachedCanvas.width}×${cachedCanvas.height} px (${L.scale}×)`;
  switchTab('preview');
}

// ─── Export ───────────────────────────────────────────────────────────────────
function doExport(fmt) {
  if (!cachedCanvas && !cachedSVG) { alert('请先生成对比图'); return; }
  if (fmt === 'png') exportPNG();
  else if (fmt === 'svg') exportSVG();
  else if (fmt === 'pdf') exportPDF();
}

function exportPNG() {
  const a = document.createElement('a');
  a.download = 'timeline_figure.png';
  a.href = cachedCanvas.toDataURL('image/png');
  a.click();
}

function exportSVG() {
  const blob = new Blob([cachedSVG], { type: 'image/svg+xml;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.download = 'timeline_figure.svg';
  a.href = url;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

async function exportPDF() {
  if (!window.jspdf) {
    alert('PDF 库尚未加载，请检查网络连接后刷新页面重试。\n（需要加载 jsPDF CDN）');
    return;
  }
  const { jsPDF } = window.jspdf;
  const scale  = +document.getElementById('outScale').value || 2;
  // Logical dimensions → points (1 logical px = 1 pt)
  const ptW = cachedCanvas.width  / scale;
  const ptH = cachedCanvas.height / scale;

  const pdf = new jsPDF({
    orientation: ptW >= ptH ? 'landscape' : 'portrait',
    unit: 'pt',
    format: [ptW, ptH]
  });
  // Embed canvas as high-res PNG; jsPDF handles compression internally
  pdf.addImage(cachedCanvas.toDataURL('image/png'), 'PNG', 0, 0, ptW, ptH, '', 'FAST');
  pdf.save('timeline_figure.pdf');
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(name) {
  ['edit','preview'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
    document.getElementById('tab-'+t+'-btn').classList.toggle('active', t===name);
  });
}
</script>
