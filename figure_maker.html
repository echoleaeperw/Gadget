<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>论文对比图生成器</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; min-height: 100vh; }

.app-header {
  background: linear-gradient(135deg, #2c3e50 0%, #4a6fa5 100%);
  color: white;
  padding: 18px 30px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
}
.app-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.app-header p { font-size: 13px; opacity: 0.75; margin-top: 3px; }

.main-content {
  display: flex;
  gap: 16px;
  padding: 16px;
  max-width: 1500px;
  margin: 0 auto;
  align-items: flex-start;
}

.left-panel { width: 260px; flex-shrink: 0; }
.right-panel { flex: 1; min-width: 0; }

.card {
  background: white;
  border-radius: 10px;
  padding: 16px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  margin-bottom: 12px;
}
.card h3 {
  font-size: 11px;
  font-weight: 700;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid #f0f2f5;
}

.form-row { display: flex; gap: 8px; margin-bottom: 10px; }
.form-group { flex: 1; }
label { display: block; font-size: 11px; color: #999; margin-bottom: 3px; font-weight: 500; }

input[type="number"], input[type="text"], textarea, select {
  width: 100%;
  padding: 6px 9px;
  border: 1px solid #e8e8e8;
  border-radius: 6px;
  font-size: 13px;
  color: #333;
  background: #fafafa;
  transition: border-color 0.15s, background 0.15s;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #4a6fa5;
  background: white;
}
input[type="color"] {
  width: 100%;
  height: 32px;
  padding: 2px 3px;
  border: 1px solid #e8e8e8;
  border-radius: 6px;
  cursor: pointer;
  background: white;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 7px;
  margin-bottom: 10px;
}
.checkbox-row input[type="checkbox"] { width: 14px; height: 14px; cursor: pointer; accent-color: #4a6fa5; }
.checkbox-row label { margin: 0; font-size: 12px; color: #555; cursor: pointer; font-weight: 400; }

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 9px 16px;
  border: none;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.btn-primary {
  background: linear-gradient(135deg, #2c3e50, #4a6fa5);
  color: white;
  width: 100%;
  padding: 11px;
  font-size: 14px;
}
.btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,111,165,0.4); }
.btn-sm {
  background: #f0f2f5;
  color: #555;
  padding: 6px 12px;
  font-size: 12px;
}
.btn-sm:hover { background: #e4e8ed; }
.btn-green {
  background: linear-gradient(135deg, #27ae60, #2ecc71);
  color: white;
  width: 100%;
  padding: 11px;
  font-size: 14px;
  margin-top: 8px;
}
.btn-green:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(39,174,96,0.4); }

/* Tabs */
.tab-bar { display: flex; gap: 4px; margin-bottom: 14px; }
.tab {
  padding: 7px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  color: #888;
  background: #f0f2f5;
  border: none;
  transition: all 0.15s;
}
.tab.active { background: #2c3e50; color: white; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Grid */
.grid-wrapper { overflow-x: auto; padding-bottom: 4px; }
.col-headers-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}
.grid-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
  align-items: flex-start;
}
.row-label-input {
  width: 72px;
  flex-shrink: 0;
  align-self: center;
  font-size: 11px !important;
  text-align: center;
}
.col-header-input {
  font-size: 12px !important;
  text-align: center;
  font-weight: 600 !important;
}
.col-header-spacer { width: 72px; flex-shrink: 0; }

/* Cell */
.cell {
  flex: 1;
  min-width: 100px;
  max-width: 200px;
  background: #f8f9fa;
  border: 1.5px dashed #ccc;
  border-radius: 7px;
  cursor: pointer;
  position: relative;
  transition: all 0.15s;
}
.cell:hover { border-color: #4a6fa5; background: #f0f4fb; }
.cell.has-image { border-style: solid; border-color: #4a6fa5; background: white; }

.cell-img-wrap {
  width: 100%;
  aspect-ratio: 4/3;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border-radius: 6px 6px 0 0;
  position: relative;
  background: #eee;
}
.cell-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.cell-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  color: #bbb;
  font-size: 11px;
  gap: 5px;
  user-select: none;
}
.cell-placeholder svg { width: 22px; height: 22px; }

.cell-remove {
  position: absolute;
  top: 4px;
  right: 4px;
  background: rgba(220,50,50,0.85);
  color: white;
  border: none;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 10px;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 5;
  line-height: 1;
}
.cell.has-image .cell-remove { display: flex; }
.cell-remove:hover { background: rgba(200,30,30,1); }

.cell-caption-wrap { padding: 5px; }
.cell-caption-wrap textarea {
  font-size: 10px;
  resize: none;
  height: 38px;
  background: #fafafa;
  line-height: 1.4;
}

/* Drop zone active */
.cell.drag-over { border-color: #27ae60; background: #f0faf4; }

/* Preview */
.preview-area {
  background: #e8eaed;
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  min-height: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: auto;
}
.preview-area canvas {
  max-width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  border-radius: 2px;
}
.preview-placeholder { color: #bbb; font-size: 14px; }

/* Batch upload banner */
.batch-hint {
  background: linear-gradient(135deg, #eef2ff, #f0f7ff);
  border: 1px dashed #4a6fa5;
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: #4a6fa5;
}

.sep { width: 100%; height: 1px; background: #f0f2f5; margin: 8px 0; }
.hidden { display: none !important; }

.status-bar {
  font-size: 11px;
  color: #aaa;
  margin-top: 8px;
  text-align: center;
}
</style>
</head>
<body>

<div class="app-header">
  <h1>论文对比图生成器</h1>
  <p>上传截图，自动排版生成学术风格对比图（支持拖拽上传）</p>
</div>

<div class="main-content">

  <!-- Left: Config Panel -->
  <div class="left-panel">

    <div class="card">
      <h3>网格布局</h3>
      <div class="form-row">
        <div class="form-group">
          <label>行数</label>
          <input type="number" id="numRows" value="3" min="1" max="12">
        </div>
        <div class="form-group">
          <label>列数</label>
          <input type="number" id="numCols" value="5" min="1" max="12">
        </div>
      </div>
      <button class="btn btn-sm" style="width:100%" onclick="applyGridConfig()">应用网格</button>
    </div>

    <div class="card">
      <h3>图像尺寸</h3>
      <div class="form-row">
        <div class="form-group">
          <label>每图宽度 (px)</label>
          <input type="number" id="imgW" value="220" min="40" max="800">
        </div>
        <div class="form-group">
          <label>每图高度 (px)</label>
          <input type="number" id="imgH" value="165" min="40" max="600">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>单元格间距</label>
          <input type="number" id="cellGap" value="10" min="0" max="60">
        </div>
        <div class="form-group">
          <label>边缘留白</label>
          <input type="number" id="outerPad" value="18" min="0" max="80">
        </div>
      </div>
    </div>

    <div class="card">
      <h3>样式设置</h3>
      <div class="form-row">
        <div class="form-group">
          <label>背景色</label>
          <input type="color" id="bgColor" value="#ffffff">
        </div>
        <div class="form-group">
          <label>文字颜色</label>
          <input type="color" id="fontColor" value="#111111">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>列标题字号</label>
          <input type="number" id="headerFontSz" value="17" min="6" max="40">
        </div>
        <div class="form-group">
          <label>图注字号</label>
          <input type="number" id="capFontSz" value="13" min="6" max="28">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>字体</label>
          <select id="fontFamily">
            <option value="Times New Roman, serif">Times New Roman</option>
            <option value="Arial, sans-serif">Arial</option>
            <option value="Georgia, serif">Georgia</option>
            <option value="'Courier New', monospace">Courier New</option>
          </select>
        </div>
        <div class="form-group">
          <label>输出倍率</label>
          <select id="outScale">
            <option value="1">1×</option>
            <option value="2" selected>2×</option>
            <option value="3">3×</option>
          </select>
        </div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="showRowLabels">
        <label for="showRowLabels">显示行标签列</label>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="boldHeaders" checked>
        <label for="boldHeaders">列标题加粗</label>
      </div>
    </div>

    <div class="card">
      <h3>底部图注（可选）</h3>
      <textarea id="figCaption" style="width:100%;min-height:64px;font-size:12px;resize:vertical" placeholder="Figure 3. Rendering quality comparison..."></textarea>
      <div class="form-row" style="margin-top:8px;margin-bottom:0">
        <div class="form-group">
          <label>图注字号</label>
          <input type="number" id="figCapFontSz" value="13" min="6" max="24">
        </div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="generateFigure()">✦ 生成对比图</button>
    <button class="btn btn-green hidden" id="downloadBtn" onclick="downloadFigure()">⬇ 下载 PNG</button>
    <p class="status-bar" id="statusBar"></p>

  </div>

  <!-- Right: Edit + Preview -->
  <div class="right-panel">
    <div class="card">
      <div class="tab-bar">
        <button class="tab active" id="tab-edit-btn" onclick="switchTab('edit')">编辑网格</button>
        <button class="tab" id="tab-preview-btn" onclick="switchTab('preview')">预览 / 下载</button>
      </div>

      <!-- Edit Tab -->
      <div class="tab-content active" id="tab-edit">
        <div class="batch-hint">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span>点击格子上传单张图 · 或将图片拖入格子 · 列标题可直接编辑</span>
          <button class="btn btn-sm" style="margin-left:auto;flex-shrink:0" onclick="batchUpload()">批量导入</button>
        </div>
        <div class="grid-wrapper">
          <div id="colHeadersRow" class="col-headers-row"></div>
          <div id="gridBody"></div>
        </div>
      </div>

      <!-- Preview Tab -->
      <div class="tab-content" id="tab-preview">
        <div class="preview-area" id="previewArea">
          <p class="preview-placeholder">请先点击左侧「生成对比图」按钮</p>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let R = 3, C = 5;
let cells  = [];   // cells[r][c] = { imgEl: HTMLImageElement|null, dataUrl: string, caption: string }
let colHdr = [];   // colHdr[c] = string
let rowLbl = [];   // rowLbl[r] = string
let generatedCanvas = null;

// ─── Init ─────────────────────────────────────────────────────────────────────
initGrid(R, C);

function initGrid(rows, cols) {
  const oldCells  = cells;
  const oldColHdr = colHdr;
  const oldRowLbl = rowLbl;

  R = rows; C = cols;
  cells  = Array.from({length: R}, (_, r) =>
    Array.from({length: C}, (_, c) =>
      (oldCells[r] && oldCells[r][c]) ? oldCells[r][c] : {imgEl: null, dataUrl: '', caption: ''}
    )
  );
  colHdr = Array.from({length: C}, (_, c) => oldColHdr[c] ?? '');
  rowLbl = Array.from({length: R}, (_, r) => oldRowLbl[r] ?? '');
  renderGrid();
}

function applyGridConfig() {
  const r = Math.max(1, Math.min(12, parseInt(document.getElementById('numRows').value) || 3));
  const c = Math.max(1, Math.min(12, parseInt(document.getElementById('numCols').value) || 5));
  initGrid(r, c);
}

// ─── Render Grid ──────────────────────────────────────────────────────────────
function renderGrid() {
  renderColHeaders();
  renderRows();
}

function renderColHeaders() {
  const container = document.getElementById('colHeadersRow');
  container.innerHTML = '';
  const showRowLabels = document.getElementById('showRowLabels').checked;

  if (showRowLabels) {
    const spacer = document.createElement('div');
    spacer.className = 'col-header-spacer';
    container.appendChild(spacer);
  }

  for (let c = 0; c < C; c++) {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'col-header-input';
    inp.value = colHdr[c];
    inp.placeholder = `标题 ${c+1}`;
    inp.style.flex = '1';
    inp.style.minWidth = '80px';
    inp.dataset.c = c;
    inp.addEventListener('input', e => { colHdr[+e.target.dataset.c] = e.target.value; });
    container.appendChild(inp);
  }
}

function renderRows() {
  const body = document.getElementById('gridBody');
  body.innerHTML = '';
  const showRowLabels = document.getElementById('showRowLabels').checked;

  for (let r = 0; r < R; r++) {
    const row = document.createElement('div');
    row.className = 'grid-row';

    if (showRowLabels) {
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'row-label-input';
      inp.value = rowLbl[r];
      inp.placeholder = `行${r+1}`;
      inp.dataset.r = r;
      inp.addEventListener('input', e => { rowLbl[+e.target.dataset.r] = e.target.value; });
      row.appendChild(inp);
    }

    for (let c = 0; c < C; c++) {
      row.appendChild(buildCell(r, c));
    }
    body.appendChild(row);
  }
}

function buildCell(r, c) {
  const data = cells[r][c];
  const cell = document.createElement('div');
  cell.className = 'cell' + (data.imgEl ? ' has-image' : '');
  cell.dataset.r = r; cell.dataset.c = c;

  // Image area
  const imgWrap = document.createElement('div');
  imgWrap.className = 'cell-img-wrap';

  if (data.imgEl) {
    const img = document.createElement('img');
    img.src = data.dataUrl;
    imgWrap.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'cell-placeholder';
    ph.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 17l5-5 4 4 3-3 6 6"/>
      <circle cx="8" cy="9" r="1.5"/>
    </svg><span>点击上传</span>`;
    imgWrap.appendChild(ph);
  }

  // Remove btn
  const rmBtn = document.createElement('button');
  rmBtn.className = 'cell-remove';
  rmBtn.textContent = '✕';
  rmBtn.title = '移除图片';
  rmBtn.addEventListener('click', e => {
    e.stopPropagation();
    cells[r][c] = {imgEl: null, dataUrl: '', caption: cells[r][c].caption};
    renderGrid();
  });
  imgWrap.appendChild(rmBtn);

  // Click to upload
  imgWrap.addEventListener('click', () => pickImage(r, c));

  // Drag & drop
  cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drag-over'); });
  cell.addEventListener('dragleave', () => cell.classList.remove('drag-over'));
  cell.addEventListener('drop', e => {
    e.preventDefault();
    cell.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) loadImageFile(file, r, c);
  });

  cell.appendChild(imgWrap);

  // Caption
  const capWrap = document.createElement('div');
  capWrap.className = 'cell-caption-wrap';
  const capTx = document.createElement('textarea');
  capTx.value = data.caption;
  capTx.placeholder = 'Bit-Acc: 91.66\nPSNR: 37.93';
  capTx.dataset.r = r; capTx.dataset.c = c;
  capTx.addEventListener('input', e => {
    cells[+e.target.dataset.r][+e.target.dataset.c].caption = e.target.value;
  });
  capWrap.appendChild(capTx);
  cell.appendChild(capWrap);

  return cell;
}

// ─── Image Loading ─────────────────────────────────────────────────────────────
function pickImage(r, c) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.onchange = e => {
    const f = e.target.files[0];
    if (f) loadImageFile(f, r, c);
  };
  inp.click();
}

function loadImageFile(file, r, c) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      cells[r][c].imgEl = img;
      cells[r][c].dataUrl = ev.target.result;
      renderGrid();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// Batch upload: fill grid left-to-right, top-to-bottom
function batchUpload() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/*';
  inp.multiple = true;
  inp.onchange = e => {
    const files = Array.from(e.target.files);
    let idx = 0;
    for (let r = 0; r < R && idx < files.length; r++) {
      for (let c = 0; c < C && idx < files.length; c++) {
        loadImageFile(files[idx++], r, c);
      }
    }
  };
  inp.click();
}

// Re-render when row label toggle changes
document.getElementById('showRowLabels').addEventListener('change', renderGrid);

// ─── Canvas Generation ────────────────────────────────────────────────────────
function generateFigure() {
  const imgW      = +document.getElementById('imgW').value      || 220;
  const imgH      = +document.getElementById('imgH').value      || 165;
  const cellGap   = +document.getElementById('cellGap').value   || 10;
  const outerPad  = +document.getElementById('outerPad').value  || 18;
  const scale     = +document.getElementById('outScale').value  || 2;
  const bgColor   = document.getElementById('bgColor').value;
  const fontColor = document.getElementById('fontColor').value;
  const hdrSz     = +document.getElementById('headerFontSz').value || 17;
  const capSz     = +document.getElementById('capFontSz').value  || 13;
  const figCapSz  = +document.getElementById('figCapFontSz').value || 13;
  const fontFam   = document.getElementById('fontFamily').value;
  const boldHdr   = document.getElementById('boldHeaders').checked;
  const showRL    = document.getElementById('showRowLabels').checked;
  const figCapTxt = document.getElementById('figCaption').value.trim();

  const rowLblW   = showRL ? 70 : 0;
  const hdrRowH   = hdrSz * 1.6 + outerPad;
  const capLineH  = capSz * 1.5;
  const capGapTop = 6; // gap between image bottom and caption top

  // Max caption lines
  let maxCapLines = 0;
  for (let r = 0; r < R; r++)
    for (let c = 0; c < C; c++) {
      const lines = cells[r][c].caption ? cells[r][c].caption.split('\n').length : 0;
      maxCapLines = Math.max(maxCapLines, lines);
    }
  const capAreaH = maxCapLines > 0 ? capGapTop + maxCapLines * capLineH : 0;
  const rowH = imgH + capAreaH + cellGap;

  // Figure caption height (word-wrap later)
  const figCapHeight = figCapTxt ? (figCapSz * 1.6 + outerPad * 2) : 0;

  const canW = outerPad + rowLblW + (imgW + cellGap) * C - cellGap + outerPad;
  const canH = outerPad + hdrRowH + rowH * R - cellGap + figCapHeight + outerPad;

  const canvas = document.createElement('canvas');
  canvas.width  = Math.round(canW * scale);
  canvas.height = Math.round(canH * scale);
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // Background
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, canW, canH);

  // Column headers
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillStyle = fontColor;
  ctx.font = `${boldHdr ? 'bold ' : ''}${hdrSz}px ${fontFam}`;
  for (let c = 0; c < C; c++) {
    const x = outerPad + rowLblW + c * (imgW + cellGap) + imgW / 2;
    const y = outerPad + hdrRowH / 2;
    ctx.fillText(colHdr[c] || '', x, y, imgW + cellGap);
  }

  // Draw each row
  for (let r = 0; r < R; r++) {
    const rowTop = outerPad + hdrRowH + r * rowH;

    // Row label (rotated)
    if (showRL && rowLbl[r]) {
      ctx.save();
      ctx.font = `bold ${hdrSz * 0.85}px ${fontFam}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = fontColor;
      ctx.translate(outerPad + rowLblW / 2, rowTop + imgH / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillText(rowLbl[r], 0, 0, imgH);
      ctx.restore();
    }

    for (let c = 0; c < C; c++) {
      const cellX = outerPad + rowLblW + c * (imgW + cellGap);
      const cellY = rowTop;
      const data  = cells[r][c];

      if (data.imgEl) {
        ctx.drawImage(data.imgEl, cellX, cellY, imgW, imgH);
      } else {
        ctx.fillStyle = '#e0e0e0';
        ctx.fillRect(cellX, cellY, imgW, imgH);
        ctx.fillStyle = '#bbb';
        ctx.font = `${capSz}px ${fontFam}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('(空)', cellX + imgW / 2, cellY + imgH / 2);
      }

      // Caption lines
      if (data.caption) {
        const lines = data.caption.split('\n');
        ctx.font = `${capSz}px ${fontFam}`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillStyle = fontColor;
        lines.forEach((line, li) => {
          ctx.fillText(
            line,
            cellX + imgW / 2,
            cellY + imgH + capGapTop + li * capLineH,
            imgW
          );
        });
      }
    }
  }

  // Figure caption (word wrap)
  if (figCapTxt) {
    const capY = outerPad + hdrRowH + rowH * R - cellGap + outerPad;
    ctx.font = `${figCapSz}px ${fontFam}`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillStyle = fontColor;
    const maxW = canW - outerPad * 2;
    let line = '', ly = capY;
    const words = figCapTxt.split(' ');
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxW && line) {
        ctx.fillText(line, outerPad, ly);
        line = word;
        ly += figCapSz * 1.5;
      } else {
        line = test;
      }
    }
    if (line) ctx.fillText(line, outerPad, ly);
  }

  generatedCanvas = canvas;
  showPreview(canvas);
  document.getElementById('downloadBtn').classList.remove('hidden');
  document.getElementById('statusBar').textContent =
    `输出尺寸：${canvas.width} × ${canvas.height} px`;
  switchTab('preview');
}

function showPreview(canvas) {
  const area = document.getElementById('previewArea');
  area.innerHTML = '';
  canvas.style.maxWidth = '100%';
  area.appendChild(canvas);
}

function downloadFigure() {
  if (!generatedCanvas) return;
  const a = document.createElement('a');
  a.download = 'comparison_figure.png';
  a.href = generatedCanvas.toDataURL('image/png');
  a.click();
}

// ─── Tab switching ────────────────────────────────────────────────────────────
function switchTab(name) {
  ['edit','preview'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===name);
    document.getElementById('tab-'+t+'-btn').classList.toggle('active', t===name);
  });
}
</script>
